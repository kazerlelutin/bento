<body class="app">
  <header class="flex items-center justify-between p-sm">
    <div class="flex items-center gap-sm">

      <a href="/" data-internal data-role="home-link">
        <h1 class="app-name">BEN<span class="app-name-accent">TO</span></h1>
      </a>
      <a class="version" href="https://ko-fi.com/kazerlelutin" target="_blank" data-external >
        v<span id="version"></span>
      </a>
    </div>
    <div class="flex items-center gap-md">
      <a href="https://ko-fi.com/kazerlelutin" target="_blank" data-external data-translate="support-me"></a>
      <select id="language-selector" class="language-selector" aria-label="">
        <option value="fr">Français</option>
        <option value="en">English</option>
        <option value="ko">한국어</option>
        <option value="ch">中文</option>
      </select>
     
    </div>
  </header>

  <main class="app-main"></main>

  <footer class="app-footer">
    <div class="crafter-controls flex gap-lg justify-center items-center" id="crafter-controls"></div>
    <nav class="app-footer-nav">
      <a href="/" data-internal aria-current="page" data-translate="home"></a>
      <a href="/favorites" data-internal data-translate="my-favorites"></a>
      <a href="/about" data-internal data-translate="about"></a>
    </nav>
  </footer>
</body>

<!-- ==================== TEMPLATES ==================== -->

<div id="PAGES">

  <template id="card">
    <div class="card">
      <div id="card-overlay" class="card-overlay" aria-live="polite">
        <div id="card-overlay-loading" class="card-overlay-loading">Chargement…</div>
        <div id="card-overlay-error" class="card-overlay-error" hidden>
          <p id="card-overlay-error-message" class="card-overlay-error-message">Impossible de charger les recettes. Vérifiez votre connexion.</p>
          <button type="button" id="card-overlay-retry" class="btn card-overlay-retry">Réessayer</button>
        </div>
      </div>
      <div class="main-card" id="main-card">
        <div class="card-container scrollbar-hidden">
          <div id="card-img"></div>
          <h1 class="text-center" id="card-title" data-role="text"></h1>
          <p class="text-center italic p-md m-0" id="card-description" aria-roledescription="Description de la recette">
          </p>

          <section class="card-section" aria-labelledby="card-ingredients-heading">
            <h2 id="card-ingredients-heading" class="card-section-title" data-translate="ingredients">Ingrédients</h2>
            <div class="card-serving" role="group" aria-label="Nombre de portions">
              <button type="button" id="card-serving-decrease" class="card-serving-btn" aria-label="Réduire le nombre de portions">−</button>
              <span id="card-serving-value" class="card-serving-value" aria-live="polite">1</span>
              <button type="button" id="card-serving-increase" class="card-serving-btn" aria-label="Augmenter le nombre de portions">+</button>
            </div>
            <ul id="card-ingredients" class="card-list" aria-label="Liste des ingrédients"></ul>
          </section>

          <section class="card-section" aria-labelledby="card-steps-heading">
            <h2 id="card-steps-heading" class="card-section-title" data-translate="steps">Étapes</h2>
            <ol id="card-steps" class="card-list card-list--steps" aria-label="Liste des étapes de la recette"></ol>
          </section>

          <section class="card-notes" aria-labelledby="card-notes-heading">
            <ul id="card-notes" class="card-notes" role="region" aria-labelledby="card-notes-heading"></ul>
          </section>
        </div>
      </div>

      <div class="flex gap-lg justify-center items-center align-self-end" id="card-controls">
        <button class="btn-round" data-action="reject" type="button" aria-label="reject">
          <svg class="btn-round-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
        <button class="btn-round" data-action="like" type="button" aria-label="like">
          <svg class="btn-round-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path
              d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
          </svg>
        </button>
        <button class="btn-round" data-action="favorite" type="button" aria-label="favorite">
          <svg class="btn-round-icon icon-bookmark-outline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
          </svg>
          <svg class="btn-round-icon icon-bookmark-filled" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
          </svg>
        </button>
      </div>
    </div>
  </template>

 

  <template id="about-template">
    <div id="about-container" class="flex flex-col overflow-y-auto gap-lg mx-auto p-lg max-w-content">
      <h1></h1>
      <div id="about-items-container" class="flex flex-col gap-md"></div>
    </div>
  </template>

  <template id="favorites-template">
    <div id="favorites-container" class="flex flex-col overflow-y-auto gap-lg mx-auto p-md max-w-content">
      <h1 class="text-center" data-translate="my-favorites"></h1>
      <div id="favorites-load-error" class="favorites-load-error" hidden aria-live="polite">
        <p id="favorites-load-error-message" class="favorites-load-error-message">Impossible de charger les recettes. Vérifiez votre connexion.</p>
        <button type="button" id="favorites-load-error-retry" class="btn favorites-load-error-retry">Réessayer</button>
      </div>
      <input type="search" id="favorites-search" class="favorites-search" placeholder="" aria-label="" autocomplete="off" />
      <p id="favorites-empty" class="favorites-empty" hidden aria-live="polite"></p>
      <div id="favorites-list" class="flex flex-col gap-md"></div>
    </div>
  </template>
</div>

<div id="COMPONENTS">

  <template id="recipe">
    <article class="about-item">
      <h2 aria-roledescription="Title of the recipe">RECIPE NAME</h2>
      <p data-role="text">SALUT</p>

    </article>
  </template>

  <template id="about-item-template">
    <article class="about-item">
      <h2 data-role="text"></h2>
      <p data-role="text"></p>
      <a href="data-role=" link" target="_blank" rel="noopener noreferrer"></a>
    </article>
  </template>

  <template id="placeholder-template">
    <div class="max-w-lg mx-auto">
      <img src="/public/placeholder.png" alt="Placeholder" class="w-full h-full object-cover rounded-lg overflow-hidden  my-0"
      aria-hidden="true">
    </div>
  </template>

</div>

<div id="micro-game-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="micro-game-title">
  <div class="micro-game-dialog">
    <section id="micro-game-consignes" class="micro-game-phase" aria-describedby="micro-game-consignes-text">
      <h2 id="micro-game-title" class="micro-game-title"></h2>
      <p id="micro-game-consignes-text" class="micro-game-consignes-text"></p>
      <button type="button" id="micro-game-start" class="btn"></button>
    </section>
    <section id="micro-game-phase-game" class="micro-game-phase" hidden>
      <div id="micro-game-timer-wrap" class="micro-game-timer-wrap">
        <div id="micro-game-timer-bar" class="micro-game-timer-bar" role="progressbar" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100"></div>
      </div>
      <div id="micro-game-container" class="micro-game-content"></div>
    </section>
    <section id="micro-game-result" class="micro-game-phase" hidden aria-live="polite">
      <p id="micro-game-result-message" class="micro-game-result-message" aria-live="polite"></p>
      <p id="micro-game-result-score" class="micro-game-result-score" aria-live="polite"></p>
      <button type="button" id="micro-game-close" class="btn" data-theme="secondary"></button>
    </section>
  </div>
</div>

<script type="module" src="app.ts"></script>

</html>
