<!-- ==================== TEMPLATES ==================== -->

<div id="PAGES">

  <template id="card">
    <div class="card">
      <div id="card-overlay" class="card-overlay" aria-live="polite" hidden>
        <div id="card-overlay-loading" class="card-overlay-loading">Chargement…</div>
        <div id="card-overlay-error" class="card-overlay-error" hidden>
          <p id="card-overlay-error-message" class="card-overlay-error-message">Impossible de charger les recettes. Vérifiez votre connexion.</p>
          <button type="button" id="card-overlay-retry" class="btn card-overlay-retry">Réessayer</button>
        </div>
      </div>
      <div class="main-card" id="main-card">
        <div class="card-container scrollbar-hidden">
          <div id="card-img"></div>
          <h1 class="text-center m-0" id="card-title" data-role="text"></h1>
          <div class="card-bento-area">
            <section id="card-bento-recap" class="card-bento-recap" hidden>
              <h2 id="card-bento-block-title" class="card-bento-block-title" data-translate="bento-block-title" hidden>Repas emporté</h2>
              <div id="card-bento-primary" class="card-bento-primary" hidden></div>
              <details id="card-bento-secondary-wrap" class="card-bento-secondary-wrap" hidden>
                <summary class="card-bento-secondary-summary">
                  <span class="card-bento-secondary-summary__label" data-translate="bento-secondary-summary">Affiner et détails</span>
                </summary>
                <dl id="card-bento-secondary-dl" class="card-bento-dl card-bento-dl--secondary"></dl>
              </details>
            </section>
            <div class="card-bento-export" role="group" id="card-bento-export">
              <div class="card-bento-export__row">
                <button type="button" id="card-bento-share" class="card-bento-export__btn" data-translate="bentext-share-short">Partager</button>
                <button type="button" id="card-bento-print" class="card-bento-export__btn" data-translate="bentext-print-short">Imprimer</button>
              </div>
            </div>
            <p id="card-bento-message" class="card-bento-message" hidden aria-live="polite"></p>
          </div>
          <p class="text-center italic p-md m-0" id="card-description" aria-roledescription="Description de la recette">
          </p>

          <section class="card-section" aria-labelledby="card-ingredients-heading">
            <h2 id="card-ingredients-heading" class="card-section-title" data-translate="ingredients">Ingrédients</h2>
            <div class="card-serving" role="group" aria-label="Nombre de portions">
              <button type="button" id="card-serving-decrease" class="card-serving-btn" aria-label="Réduire le nombre de portions">−</button>
              <span id="card-serving-value" class="card-serving-value" aria-live="polite">1</span>
              <button type="button" id="card-serving-increase" class="card-serving-btn" aria-label="Augmenter le nombre de portions">+</button>
            </div>
            <ul id="card-ingredients" class="card-list" aria-label="Liste des ingrédients"></ul>
          </section>

          <section class="card-section" aria-labelledby="card-steps-heading">
            <h2 id="card-steps-heading" class="card-section-title" data-translate="steps">Étapes</h2>
            <ol id="card-steps" class="card-list card-list--steps" aria-label="Liste des étapes de la recette"></ol>
          </section>

          <section class="card-notes" aria-labelledby="card-notes-heading">
            <ul id="card-notes" class="card-notes" role="region" aria-labelledby="card-notes-heading"></ul>
          </section>

          <div class="card-bento-export card-bento-export--bottom" role="group" id="card-bento-export-bottom">
            <div class="card-bento-export__row">
              <button type="button" id="card-bento-share-bottom" class="card-bento-export__btn" data-translate="bentext-share-short">Partager</button>
              <button type="button" id="card-bento-print-bottom" class="card-bento-export__btn" data-translate="bentext-print-short">Imprimer</button>
            </div>
          </div>
        </div>
      </div>

      <div class="flex gap-lg justify-center items-center align-self-end card-controls-row" id="card-controls">
        <button class="btn-card-random" data-action="random" type="button"></button>
        <button type="button" class="app-mobile-nav-trigger app-card-nav-burger" data-open-mobile-nav
          aria-expanded="false" aria-controls="mobile-nav-sheet">
          <span class="visually-hidden" data-translate="nav-menu-open"></span>
          <span class="app-burger-icon" aria-hidden="true"><span></span><span></span><span></span></span>
        </button>
      </div>
    </div>
  </template>

 

  <template id="about-template">
    <div id="about-container" class="flex flex-col overflow-y-auto gap-lg mx-auto p-lg max-w-content">
      <h1></h1>
      <div id="about-items-container" class="flex flex-col gap-md"></div>
    </div>
  </template>

  <template id="privacy-template">
    <div id="privacy-container" class="flex flex-col overflow-y-auto gap-lg mx-auto p-lg max-w-content">
      <h1></h1>
      <div id="privacy-items-container" class="flex flex-col gap-md"></div>
    </div>
  </template>

  <template id="recipes-template">
    <div class="recipes-page-layout flex flex-col h-full min-h-0">
      <div id="recipes-container" class="flex flex-col overflow-y-auto gap-lg mx-auto p-md max-w-content flex-1 min-h-0 w-full">
        <h1 class="text-center text-base sm:text-lg font-semibold tracking-tight" data-translate="recipes-catalog-title-short"></h1>
        <div id="recipes-load-error" class="recipes-load-error" hidden aria-live="polite">
          <p id="recipes-load-error-message" class="recipes-load-error-message">Impossible de charger les recettes. Vérifiez votre connexion.</p>
          <button type="button" id="recipes-load-error-retry" class="btn recipes-load-error-retry">Réessayer</button>
        </div>
        <div id="recipes-search-toolbar" class="recipes-search-toolbar">
          <div id="recipes-filter-chips" class="recipes-filter-chips" aria-live="polite"></div>
          <div class="recipes-search-row">
            <button type="button" id="recipes-filter-add" class="recipes-filter-add" aria-expanded="false" aria-haspopup="dialog">+</button>
            <input type="search" id="recipes-search" class="recipes-search" placeholder="" aria-label="" autocomplete="off" />
          </div>
          <div id="recipes-filter-popover" class="recipes-filter-popover" hidden role="dialog" aria-modal="true">
            <label id="recipes-filter-field-label" for="recipes-filter-field" class="recipes-filter-popover__label"></label>
            <select id="recipes-filter-field" class="recipes-filter-select"></select>
            <label id="recipes-filter-value-label" for="recipes-filter-value" class="recipes-filter-popover__label"></label>
            <select id="recipes-filter-value" class="recipes-filter-select"></select>
            <button type="button" id="recipes-filter-apply" class="btn recipes-filter-apply"></button>
          </div>
        </div>
        <p id="recipes-empty" class="favorites-empty" hidden aria-live="polite"></p>
        <div id="recipes-list-wrap" class="recipes-list-wrap">
          <div id="recipes-list-loading" class="recipes-list-loading" hidden aria-busy="false">
            <span class="recipes-list-loading__text" data-translate="recipes-loading">Chargement…</span>
          </div>
          <div id="recipes-list" class="flex flex-col gap-md"></div>
        </div>
      </div>
    </div>
  </template>

  <template id="not-found-template">
    <div id="not-found-page" class="not-found-page flex flex-col items-center justify-center gap-md mx-auto p-lg max-w-content flex-1 min-h-0 text-center">
      <p class="not-found-code" aria-hidden="true">404</p>
      <p class="not-found-message m-0 text-base" data-translate="not-found-message"></p>
      <a id="not-found-home-link" href="/fr" class="btn not-found-home" data-internal data-translate="not-found-back-home"></a>
    </div>
  </template>
</div>

<div id="COMPONENTS">

  <template id="recipe">
    <article class="about-item">
      <h2 aria-roledescription="Title of the recipe">RECIPE NAME</h2>
      <p data-role="text">SALUT</p>

    </article>
  </template>

  <template id="about-item-template">
    <article class="about-item">
      <h2 data-role="text"></h2>
      <p data-role="text"></p>
      <a href="data-role=" link" target="_blank" rel="noopener noreferrer"></a>
    </article>
  </template>

  <template id="placeholder-template">
    <div class="max-w-lg mx-auto">
      <img src="/public/placeholder.png" alt="Placeholder" class="w-full h-full object-cover rounded-lg overflow-hidden  my-0"
      aria-hidden="true">
    </div>
  </template>

</div>
