<!-- ==================== TEMPLATES ==================== -->

<div id="PAGES">

  <template id="card">
    <div class="card">
      <div id="card-overlay" class="card-overlay" aria-live="polite">
        <div id="card-overlay-loading" class="card-overlay-loading">Chargement…</div>
        <div id="card-overlay-error" class="card-overlay-error" hidden>
          <p id="card-overlay-error-message" class="card-overlay-error-message">Impossible de charger les recettes. Vérifiez votre connexion.</p>
          <button type="button" id="card-overlay-retry" class="btn card-overlay-retry">Réessayer</button>
        </div>
      </div>
      <div class="main-card" id="main-card">
        <div class="card-container scrollbar-hidden">
          <div id="card-img"></div>
          <h1 class="text-center m-0" id="card-title" data-role="text"></h1>
          <div class="card-bento-area">
            <section id="card-bento-recap" class="card-bento-recap" hidden>
              <dl id="card-bento-dl" class="card-bento-dl"></dl>
            </section>
            <div class="card-bento-export" role="group" id="card-bento-export">
              <div class="card-bento-export__row">
                <button type="button" id="card-bento-copy" class="card-bento-export__btn" data-translate="bentext-copy-short">Copier</button>
                <button type="button" id="card-bento-print" class="card-bento-export__btn" data-translate="bentext-print-short">Imprimer</button>
              </div>
            </div>
            <p id="card-bento-message" class="card-bento-message" hidden aria-live="polite"></p>
          </div>
          <p class="text-center italic p-md m-0" id="card-description" aria-roledescription="Description de la recette">
          </p>

          <section class="card-section" aria-labelledby="card-ingredients-heading">
            <h2 id="card-ingredients-heading" class="card-section-title" data-translate="ingredients">Ingrédients</h2>
            <div class="card-serving" role="group" aria-label="Nombre de portions">
              <button type="button" id="card-serving-decrease" class="card-serving-btn" aria-label="Réduire le nombre de portions">−</button>
              <span id="card-serving-value" class="card-serving-value" aria-live="polite">1</span>
              <button type="button" id="card-serving-increase" class="card-serving-btn" aria-label="Augmenter le nombre de portions">+</button>
            </div>
            <ul id="card-ingredients" class="card-list" aria-label="Liste des ingrédients"></ul>
          </section>

          <section class="card-section" aria-labelledby="card-steps-heading">
            <h2 id="card-steps-heading" class="card-section-title" data-translate="steps">Étapes</h2>
            <ol id="card-steps" class="card-list card-list--steps" aria-label="Liste des étapes de la recette"></ol>
          </section>

          <section class="card-notes" aria-labelledby="card-notes-heading">
            <ul id="card-notes" class="card-notes" role="region" aria-labelledby="card-notes-heading"></ul>
          </section>
        </div>
      </div>

      <div class="flex gap-lg justify-center items-center align-self-end" id="card-controls">
        <button class="btn-round" data-action="random" type="button" aria-label="random">
          <svg class="btn-round-icon btn-round-icon--dice" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="5" y="5" width="14" height="14" rx="2.5" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linejoin="round" />
            <circle cx="9" cy="9" r="1.35" fill="currentColor" />
            <circle cx="15" cy="9" r="1.35" fill="currentColor" />
            <circle cx="12" cy="12" r="1.35" fill="currentColor" />
            <circle cx="9" cy="15" r="1.35" fill="currentColor" />
            <circle cx="15" cy="15" r="1.35" fill="currentColor" />
          </svg>
        </button>
        <button class="btn-round" data-action="catalog" type="button" aria-label="catalog">
          <svg class="btn-round-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 6h16M4 12h16M4 18h10" />
          </svg>
        </button>
      </div>
    </div>
  </template>

 

  <template id="about-template">
    <div id="about-container" class="flex flex-col overflow-y-auto gap-lg mx-auto p-lg max-w-content">
      <h1></h1>
      <div id="about-items-container" class="flex flex-col gap-md"></div>
    </div>
  </template>

  <template id="recipes-template">
    <div class="recipes-page-layout flex flex-col h-full min-h-0">
      <div id="recipes-container" class="flex flex-col overflow-y-auto gap-lg mx-auto p-md max-w-content flex-1 min-h-0 w-full">
        <h1 class="text-center" data-translate="all-recipes"></h1>
        <div id="recipes-load-error" class="recipes-load-error" hidden aria-live="polite">
          <p id="recipes-load-error-message" class="recipes-load-error-message">Impossible de charger les recettes. Vérifiez votre connexion.</p>
          <button type="button" id="recipes-load-error-retry" class="btn recipes-load-error-retry">Réessayer</button>
        </div>
        <input type="search" id="recipes-search" class="recipes-search" placeholder="" aria-label="" autocomplete="off" />
        <p id="recipes-empty" class="favorites-empty" hidden aria-live="polite"></p>
        <div id="recipes-list" class="flex flex-col gap-md"></div>
      </div>
      <div class="recipes-page-controls flex gap-lg justify-center items-center flex-shrink-0">
        <div class="flex gap-lg justify-center items-center" id="card-controls">
          <button class="btn-round" data-action="random" type="button" aria-label="random">
            <svg class="btn-round-icon btn-round-icon--dice" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="5" y="5" width="14" height="14" rx="2.5" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linejoin="round" />
              <circle cx="9" cy="9" r="1.35" fill="currentColor" />
              <circle cx="15" cy="9" r="1.35" fill="currentColor" />
              <circle cx="12" cy="12" r="1.35" fill="currentColor" />
              <circle cx="9" cy="15" r="1.35" fill="currentColor" />
              <circle cx="15" cy="15" r="1.35" fill="currentColor" />
            </svg>
          </button>
          <button class="btn-round" data-action="catalog" type="button" aria-label="catalog">
            <svg class="btn-round-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 6h16M4 12h16M4 18h10" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </template>
</div>

    <article class="about-item">

    </article>

  <template id="placeholder-template">

      <img src="/public/placeholder.png" alt="Placeholder" class="w-full h-full object-cover rounded-lg overflow-hidden  my-0"
      aria-hidden="true">
    </div>
  </template>

</div>
